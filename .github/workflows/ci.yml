# ─────────────────────────────────────────────────────────────
#  CI — Code Quality, Build & Notebook Hygiene
#  EY Challenge 2026  ·  EUR-UN
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Python lint & import check ──────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            resources/code/snowflake/requirements.txt
            resources/code/general/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for req in resources/code/snowflake/requirements.txt \
                     resources/code/general/requirements.txt; do
            [ -f "$req" ] && pip install -r "$req"
          done

      - name: Syntax check (py_compile)
        run: |
          find . -name '*.py' -not -path './.git/*' \
            -exec python -m py_compile {} +

  # ── Documentation build ─────────────────────────────────────
  docs:
    name: LaTeX environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live (LuaLaTeX + CJK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            make \
            texlive-luatex \
            texlive-lang-chinese \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-plain-generic

      - name: Build docs via Makefile
        run: |
          cd doc
          make

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: EY_Challenge_2026_Report
          path: doc/dist/EY_Challenge_2026_Report.pdf

  # ── Release sync for documentation ──────────────────────────
  release-doc:
    name: Publish PDF to Release
    runs-on: ubuntu-latest
    needs: docs
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: EY_Challenge_2026_Report
          path: doc/dist

      - name: Upload PDF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: doc/dist/EY_Challenge_2026_Report.pdf

  # ── Notebook hygiene ────────────────────────────────────────
  notebooks:
    name: Notebook size check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject oversized notebooks (> 5 MB)
        run: |
          echo "🔍 Scanning for notebooks larger than 5 MB…"
          oversized=$(find . -name '*.ipynb' -size +5M -print)
          if [ -n "$oversized" ]; then
            echo "::error::Oversized notebooks detected:"
            echo "$oversized"
            exit 1
          fi
          echo "✅ All notebooks within size limit."
